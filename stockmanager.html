<!DOCTYPE html>
<html>
<head>
  <title>Stock Suite Pro</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }
    header { background:#020617; padding:15px; text-align:center; font-size:24px; }
    .container { padding:20px; }
    input, button { padding:8px; margin:5px; border-radius:8px; border:none; }
    button { background:#22c55e; color:white; cursor:pointer; }
    .grid { display:flex; flex-wrap:wrap; }
    .card { width:220px; padding:15px; margin:10px; border-radius:12px; }
    .stats { display:flex; gap:20px; margin-bottom:20px; }
    .stat { background:#1e293b; padding:15px; border-radius:10px; }
    table { width:100%; margin-top:20px; border-collapse:collapse; }
    td, th { border:1px solid #334155; padding:8px; }
  </style>
</head>
<body>

<header>📦 Stock Suite Pro</header>

<div class="container">

  <div class="stats">
    <div class="stat">💰 £<span id="money">0</span></div>
    <div class="stat">📦 Sold: <span id="sold">0</span></div>
    <div class="stat">⚠️ Low: <span id="low">0</span></div>
  </div>

  <input id="name" placeholder="Item">
  <input id="qty" type="number" placeholder="Qty">
  <input id="color" placeholder="Color">
  <input id="category" placeholder="Category">
  <button onclick="addItem()">Add</button>

  <br><br>
  <input id="search" placeholder="Search..." oninput="renderItems()">

  <div class="grid" id="items"></div>

  <h2>Sales</h2>
  <button onclick="exportCSV()">Export CSV</button>

  <table>
    <thead>
      <tr><th>Item</th><th>Qty</th><th>£</th><th>Date</th></tr>
    </thead>
    <tbody id="sales"></tbody>
  </table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, update, remove, onValue, get, push } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOROzkHTt9A-bmGyE4TKB0s3ji1h5hNmo",
  authDomain: "stockmanager-ec621.firebaseapp.com",
  databaseURL: "https://stockmanager-ec621-default-rtdb.firebaseio.com",
  projectId: "stockmanager-ec621",
  storageBucket: "stockmanager-ec621.firebasestorage.app",
  messagingSenderId: "900423397402",
  appId: "1:900423397402:web:b25af5bfef18090f1ce1a3",
  measurementId: "G-55Z9HMYS11"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ADD ITEM
window.addItem = async () => {
  let name = nameInput.value;
  let qty = parseInt(qtyInput.value);
  let color = colorInput.value || "#334155";
  let category = categoryInput.value || "General";

  if (!name || !qty) return;

  await set(ref(db, "items/" + name), { qty, color, category });
};

// UPDATE QTY
window.updateQty = async (name, change) => {
  let snap = await get(ref(db, "items/" + name));
  let d = snap.val();
  let q = d.qty + change;
  if (q < 0) q = 0;

  await update(ref(db, "items/" + name), { qty: q });
};

// DELETE
window.deleteItem = (name) => {
  if (confirm("Delete?")) remove(ref(db, "items/" + name));
};

// SELL
window.sellItem = async (name) => {
  let qty = parseInt(prompt("Qty sold"));
  let price = parseFloat(prompt("Total price"));

  if (!qty || !price) return;

  await updateQty(name, -qty);

  await push(ref(db, "sales"), {
    name, qty, price,
    date: new Date().toLocaleString()
  });

  let snap = await get(ref(db, "stats"));
  let s = snap.val() || { money:0, sold:0 };

  await set(ref(db, "stats"), {
    money: s.money + price,
    sold: s.sold + qty
  });
};

// RENDER ITEMS
window.renderItems = () => {
  onValue(ref(db, "items"), snap => {
    let container = document.getElementById("items");
    container.innerHTML = "";

    let search = searchInput.value.toLowerCase();
    let low = 0;

    snap.forEach(c => {
      let name = c.key;
      let d = c.val();

      if (!name.toLowerCase().includes(search)) return;
      if (d.qty < 5) low++;

      let div = document.createElement("div");
      div.className = "card";
      div.style.background = d.color;

      div.innerHTML = `
        <h3>${name}</h3>
        <p>${d.category}</p>
        <p>Stock: ${d.qty}</p>
        <button onclick="updateQty('${name}',1)">+</button>
        <button onclick="updateQty('${name}',-1)">-</button>
        <button onclick="sellItem('${name}')">Sell</button>
        <button onclick="deleteItem('${name}')">Delete</button>
      `;

      container.appendChild(div);
    });

    lowEl.innerText = low;
  });
};

// SALES TABLE
onValue(ref(db, "sales"), snap => {
  sales.innerHTML = "";
  snap.forEach(c => {
    let s = c.val();
    sales.innerHTML += `
      <tr>
        <td>${s.name}</td>
        <td>${s.qty}</td>
        <td>${s.price}</td>
        <td>${s.date}</td>
      </tr>`;
  });
});

// STATS
onValue(ref(db, "stats"), snap => {
  let s = snap.val() || { money:0, sold:0 };
  money.innerText = s.money;
  sold.innerText = s.sold;
});

// EXPORT CSV
window.exportCSV = async () => {
  let snap = await get(ref(db, "sales"));
  let csv = "Item,Qty,Price,Date\n";

  snap.forEach(c => {
    let s = c.val();
    csv += `${s.name},${s.qty},${s.price},${s.date}\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "sales.csv";
  a.click();
};

// INPUT REFS
const nameInput = document.getElementById("name");
const qtyInput = document.getElementById("qty");
const colorInput = document.getElementById("color");
const categoryInput = document.getElementById("category");
const searchInput = document.getElementById("search");
const lowEl = document.getElementById("low");

// INIT
renderItems();

</script>

</body>
</html>
